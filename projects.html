<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Projects — Portfolio</title>
  <link rel="stylesheet" href="style.css" />
  <script defer src="script.js"></script>
</head>
<body>
  <header class="header">
    <div class="container row">
      <a class="brand" href="index.html">Your Name</a>

      <button class="navBtn" type="button" aria-expanded="false" aria-controls="nav">
        ☰
      </button>

      <nav class="nav" id="nav">
        <a href="index.html" data-nav>Home</a>
        <a href="projects.html" data-nav>Projects</a>
        <a href="cv.html" data-nav>CV</a>
        <a href="about.html" data-nav>About</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1>Projects</h1>

          <img src="assets/projects/p1.jpg" alt="Project 1 thumbnail" loading="lazy">

        </button>

        </button>
      </article>

           <p class="muted">One line summary.</p>

          <button class="thumbBtn btn ghost" type="button" data-open>

          </button>

            <span>Details</span>
          </button>
      </article>

      <article class="card" data-project data-title="Project 6" data-desc="Short description for Project 6.">

          <p class="muted">One line summary.</p>

          <button class="thumbBtn btn ghost" type="button" data-open>
           <img src="assets/projects/p6.jpg" alt="Project 6 thumbnail" loading="lazy">

          </button>
      </article>
    </div>
  </main>

  <!-- Simple modal -->
  <div class="modal" hidden data-modal>
    <div class="backdrop" data-close></div>
    <div class="panel" role="dialog" aria-modal="true">
      <button class="x" type="button" data-close aria-label="Close">✕</button>
      <h3 id="mTitle">Title</h3>
      <p id="mDesc" class="muted">Description</p>
    </div>
  </div>

  <footer class="footer">
    <div class="container row">
      <span>© <span data-year></span> Your Name</span>
      <a href="#top">Top</a>
    </div>
  </footer>
</body>
</html>
